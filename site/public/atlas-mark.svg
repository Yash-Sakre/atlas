<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Atlas">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1b1713"/>
      <stop offset="1" stop-color="#0a0908"/>
    </linearGradient>
    <radialGradient id="sheen" cx="0.82" cy="0.06" r="0.9">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hub" cx="0.4" cy="0.35" r="0.8">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#d9d7d2"/>
    </radialGradient>
  </defs>

  <!-- app tile -->
  <rect x="0" y="0" width="512" height="512" rx="116" fill="url(#tile)"/>
  <rect x="0" y="0" width="512" height="512" rx="116" fill="url(#sheen)"/>
  <rect x="1" y="1" width="510" height="510" rx="115" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>

  <!-- hexagon orbit -->
  <polygon points="256,106 386,181 386,331 256,406 126,331 126,181"
           fill="none" stroke="#ffffff" stroke-opacity="0.10" stroke-width="3"/>

  <!-- edges: hub → asset nodes -->
  <g stroke="#ffffff" stroke-opacity="0.26" stroke-width="6" stroke-linecap="round">
    <line x1="256" y1="256" x2="256" y2="106"/>
    <line x1="256" y1="256" x2="386" y2="181"/>
    <line x1="256" y1="256" x2="386" y2="331"/>
    <line x1="256" y1="256" x2="256" y2="406"/>
    <line x1="256" y1="256" x2="126" y2="331"/>
    <line x1="256" y1="256" x2="126" y2="181"/>
  </g>

  <!-- asset nodes: glow halo + solid (one per asset kind) -->
  <g>
    <circle cx="256" cy="106" r="34" fill="#7fc4ff" fill-opacity="0.22"/>
    <circle cx="256" cy="106" r="22" fill="#7fc4ff"/>
    <circle cx="386" cy="181" r="34" fill="#c0a8ff" fill-opacity="0.22"/>
    <circle cx="386" cy="181" r="22" fill="#c0a8ff"/>
    <circle cx="386" cy="331" r="34" fill="#7be3a8" fill-opacity="0.22"/>
    <circle cx="386" cy="331" r="22" fill="#7be3a8"/>
    <circle cx="256" cy="406" r="34" fill="#ffce85" fill-opacity="0.22"/>
    <circle cx="256" cy="406" r="22" fill="#ffce85"/>
    <circle cx="126" cy="331" r="34" fill="#ffb27d" fill-opacity="0.22"/>
    <circle cx="126" cy="331" r="22" fill="#ffb27d"/>
    <circle cx="126" cy="181" r="34" fill="#e6a3ff" fill-opacity="0.22"/>
    <circle cx="126" cy="181" r="22" fill="#e6a3ff"/>
  </g>

  <!-- central hub -->
  <circle cx="256" cy="256" r="44" fill="#0a0908" fill-opacity="0.55"/>
  <circle cx="256" cy="256" r="34" fill="url(#hub)"/>
  <circle cx="256" cy="256" r="34" fill="none" stroke="#0a0908" stroke-opacity="0.12" stroke-width="2"/>
</svg>
