name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build CLI
        run: npm run build

      - name: Build dashboard
        run: npm run build:dashboard

      - name: Test
        run: npm test

      - name: Smoke test the CLI
        run: node dist/index.js analyze examples/sample-app --no-cache
